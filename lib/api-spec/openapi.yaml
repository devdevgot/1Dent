          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorKpiListResponse"

  /migration/excel/preview:
    post:
      operationId: previewExcelImport
      tags: [migration]
      summary: Parse Excel file and return column preview
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExcelPreviewRequest"
      responses:
        "200":
          description: Preview rows and detected columns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExcelPreviewResponse"

  /migration/excel/confirm:
    post:
      operationId: confirmExcelImport
      tags: [migration]
      summary: Start Excel import job with column mapping
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExcelConfirmRequest"
      responses:
        "200":
          description: Migration job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJobResponse"

  /migration/trello/connect:
    post:
      operationId: connectTrello
      tags: [migration]
      summary: Validate Trello credentials and return board list
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrelloConnectRequest"
      responses:
        "200":
          description: Trello boards list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrelloConnectResponse"

  /migration/trello/import:
    post:
      operationId: startTrelloImport
      tags: [migration]
      summary: Start Trello board import job
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrelloImportRequest"
      responses:
        "200":
          description: Migration job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJobResponse"

  /migration/jobs:
    get:
      operationId: listMigrationJobs
      tags: [migration]
      summary: List all migration jobs for the clinic
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of migration jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJobsResponse"

  /migration/{jobId}/status:
    get:
      operationId: getMigrationJobStatus
      tags: [migration]
      summary: Get migration job status and progress
      security:
        - cookieAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJobStatusResponse"
        "404":
          description: Job not found

  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List channels for the clinic
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Channels list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelsListResponse"
    post:
      operationId: createChannel
      tags: [channels]
      summary: Create a new channel
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"

  /channels/stats:
    get:
      operationId: getChannelStats
      tags: [channels]
      summary: Get analytics stats per channel
      security:
        - cookieAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Channel stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelStatsResponse"

  /channels/{id}:
    delete:
      operationId: deleteChannel
      tags: [channels]
      summary: Delete a channel
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Channel deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clinic/whatsapp-phone:
    patch:
      operationId: updateClinicWhatsappPhone
      tags: [channels]
      summary: Update clinic WhatsApp phone number (owner only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                whatsappPhone:
                  type: string
              required:
                - whatsappPhone
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  schemas:
    WhatsAppWebhookPayload:
      type: object
      description: Inbound webhook payload from Meta WhatsApp Business API
      properties:
        entry:
          type: array
          items:
            type: object
            properties:
              changes:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: object
                      properties:
                        messages:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              from:
                                type: string
                                description: Sender's WhatsApp phone number (digits only, e.g. "79001234567")
                              text:
                                type: object
                                properties:
                                  body:
                                    type: string
                        metadata:
                          type: object
                          properties:
                            phone_number_id:
                              type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
      required:
        - success
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
      required:
        - success

    ClinicChannel:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [instagram, telegram, 2gis, website, whatsapp, referral, other]
        refCode:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - name
        - type
        - refCode
        - createdAt

    CreateChannelRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [instagram, telegram, 2gis, website, whatsapp, referral, other]
      required:
        - name
        - type

    ChannelsListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            channels:
              type: array
              items:
                $ref: "#/components/schemas/ClinicChannel"
          required:
            - channels
      required:
        - success
        - data

    ChannelResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            channel:
              $ref: "#/components/schemas/ClinicChannel"
          required:
            - channel
      required:
        - success
        - data

    ChannelStat:
      type: object
      properties:
        channelId:
          type: string
        channelName:
          type: string
        channelType:
          type: string
        refCode:
          type: string
        clickCount:
          type: integer
          description: Total number of unique clicks on the referral link
        patientCount:
          type: integer
        consultationCount:
          type: integer
        conversionRate:
          type: number
        totalRevenue:
          type: number
      required:
        - channelId
        - channelName
        - channelType
        - refCode
        - clickCount
        - patientCount
        - consultationCount
        - conversionRate
        - totalRevenue

    ChannelStatsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            stats:
              type: array
              items:
                $ref: "#/components/schemas/ChannelStat"
          required:
            - stats
      required:
        - success
        - data

    UserRole:
      type: string
      enum: [owner, admin, doctor, accountant, warehouse]

    User:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - name
        - email
        - role
        - createdAt

    Clinic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        whatsappPhone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    RegisterRequest:
      type: object
      properties:
        clinicName:
          type: string
          minLength: 2
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - clinicName
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 6
      required:
        - currentPassword
        - newPassword

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    ForgotPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        devToken:
          type: string
          description: Present only in non-production for testing reset flow
      required:
        - success
        - message

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 6
      required:
        - token
        - newPassword

    CreatePlanRequest:
      type: object
      properties:
        plan:
          type: string
          minLength: 1
        contactName:
          type: string
          minLength: 1
        contactPhone:
          type: string
          minLength: 5
        contactEmail:
          type: string
          format: email
        message:
          type: string
      required:
        - plan
        - contactName
        - contactPhone

    PlanRequestResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            id:
              type: string
          required:
            - id
      required:
        - success
        - data

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          $ref: "#/components/schemas/UserRole"
      required:
        - name
        - email
        - password
        - role

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    PatchUserCapacityRequest:
      type: object
      required:
        - maxPatientsPerDay
      properties:
        maxPatientsPerDay:
          type: integer
          minimum: 1
          maximum: 50
          description: Maximum number of patients per day for this doctor

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            clinic:
              $ref: "#/components/schemas/Clinic"
          required:
            - user
            - clinic
      required:
        - success
        - data

    MeResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            clinic:
              $ref: "#/components/schemas/Clinic"
          required:
            - user
            - clinic
      required:
        - success
        - data

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
          required:
            - user
      required:
        - success
        - data

    UsersListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            users:
              type: array
              items:
                $ref: "#/components/schemas/User"
          required:
            - users
      required:
        - success
        - data

    PatientStatus:
      type: string
      enum:
        - new_request
        - initial_consultation
        - diagnostics
        - treatment_assigned
        - treatment_in_progress
        - payment_processing
        - post_op_monitoring
        - completed
        - repeat_sale

    PatientSource:
      type: string
      description: Patient acquisition source. Can be a standard value (instagram, referral, walk_in, website, whatsapp, other) or a custom channel ref code (e.g. ref:abc12345) or a channel ID.

    InteractionType:
      type: string
      enum:
        - note
        - call
        - whatsapp
        - status_change
        - appointment

    Patient:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        doctorId:
          type: string
          nullable: true
        name:
          type: string
        phone:
          type: string
        iin:
          type: string
          nullable: true
          pattern: '^\d{12}$'
        dateOfBirth:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [male, female, other]
          nullable: true
        source:
          $ref: "#/components/schemas/PatientSource"
        status:
          $ref: "#/components/schemas/PatientStatus"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - name
        - phone
        - source
        - status
        - createdAt
        - updatedAt

    PatientInteraction:
      type: object
      properties:
        id:
          type: string
        patientId:
          type: string
        clinicId:
          type: string
        userId:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/InteractionType"
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - clinicId
        - type
        - content
        - createdAt

    CreatePatientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 5
        iin:
          type: string
          pattern: '^\d{12}$'
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, other]
        source:
          $ref: "#/components/schemas/PatientSource"
        doctorId:
          type: string
        notes:
          type: string
      required:
        - name
        - phone

    UpdatePatientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 5
        iin:
          type: string
          pattern: '^\d{12}$'
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, other]
        source:
          $ref: "#/components/schemas/PatientSource"
        doctorId:
          type: string
        notes:
          type: string

    UpdatePatientStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PatientStatus"
      required:
        - status

    AddInteractionRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/InteractionType"
        content:
          type: string
          minLength: 1
      required:
        - type
        - content

    PatientResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            patient:
              $ref: "#/components/schemas/Patient"
          required:
            - patient
      required:
        - success
        - data

    PatientDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            patient:
              $ref: "#/components/schemas/Patient"
            interactions:
              type: array
              items:
                $ref: "#/components/schemas/PatientInteraction"
          required:
            - patient
            - interactions
      required:
        - success
        - data

    PatientsListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            patients:
              type: array
              items:
                $ref: "#/components/schemas/Patient"
          required:
            - patients
      required:
        - success
        - data

    InteractionResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            interaction:
              $ref: "#/components/schemas/PatientInteraction"
          required:
            - interaction
      required:
        - success
        - data

    # ─── Messaging ────────────────────────────────────────────────────────────

    MessageDirection:
      type: string
      enum: [inbound, outbound]

    Message:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        patientId:
          type: string
        direction:
          $ref: "#/components/schemas/MessageDirection"
        senderId:
          type: string
          nullable: true
        content:
          type: string
        whatsappMessageId:
          type: string
          nullable: true
        isRedAlert:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - patientId
        - direction
        - senderId
        - content
        - whatsappMessageId
        - isRedAlert
        - createdAt

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
          maxLength: 4096
        attachment:
          type: object
          properties:
            objectPath:
              type: string
            fileName:
              type: string
            contentType:
              type: string
          required:
            - objectPath
            - fileName
            - contentType

    MessagesResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/Message"
          required:
            - messages
      required:
        - success
        - data

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            message:
              $ref: "#/components/schemas/Message"
          required:
            - message
      required:
        - success
        - data

    # ─── Notifications ────────────────────────────────────────────────────────

    NotificationType:
      type: string
      enum: [red_alert, new_message, appointment, system, appointment_reminder]

    Notification:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        userId:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        message:
          type: string
        read:
          type: boolean
        patientId:
          type: string
          nullable: true
        messageId:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - userId
        - type
        - message
        - read
        - patientId
        - messageId
        - createdAt

    NotificationsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            notifications:
              type: array
              items:
                $ref: "#/components/schemas/Notification"
          required:
            - notifications
      required:
        - success
        - data

    NotificationResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            notification:
              $ref: "#/components/schemas/Notification"
          required:
            - notification
      required:
        - success
        - data

    # ─── Dental Chart ────────────────────────────────────────────────────────

    ToothCondition:
      type: string
      enum:
        - healthy
        - cavity
        - treated
        - crown
        - root_canal
        - implant
        - missing
        - extraction_needed

    ToothRecord:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        patientId:
          type: string
        toothFdi:
          type: integer
        condition:
          $ref: "#/components/schemas/ToothCondition"
        notes:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          nullable: true
      required:
        - id
        - clinicId
        - patientId
        - toothFdi
        - condition
        - updatedAt

    UpdateToothRequest:
      type: object
      properties:
        condition:
          $ref: "#/components/schemas/ToothCondition"
        notes:
          type: string
      required:
        - condition

    ToothResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            tooth:
              $ref: "#/components/schemas/ToothRecord"
          required:
            - tooth
      required:
        - success
        - data

    TeethResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            teeth:
              type: array
              items:
                $ref: "#/components/schemas/ToothRecord"
          required:
            - teeth
      required:
        - success
        - data

    ConditionPriceEntry:
      type: object
      properties:
        price:
          type: number
        mkb10:
          type: string
      required:
        - price
        - mkb10

    ConditionPricesMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ConditionPriceEntry"
      description: Map of condition name to price and ICD-10 code

    ConditionPricesResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            prices:
              $ref: "#/components/schemas/ConditionPricesMap"
          required:
            - prices
      required:
        - success
        - data

    UpdateConditionPriceItem:
      type: object
      properties:
        price:
          type: number
          minimum: 0
        mkb10Code:
          type: string
      required:
        - price

    UpdateConditionPricesRequest:
      type: object
      properties:
        prices:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/UpdateConditionPriceItem"
          description: Map of condition name to price and optional МКБ-10 code
      required:
        - prices

    ToothTaskType:
      type: string
      enum:
        - treatment
        - extraction

    ToothTaskStatus:
      type: string
      enum:
        - in_progress
        - done

    ToothTreatment:
