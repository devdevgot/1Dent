openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dental CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: patients
    description: Patient management operations
  - name: dental
    description: Dental chart and tooth records
  - name: inventory
    description: Inventory and stock management
  - name: procedures
    description: Procedure management
  - name: analytics
    description: Analytics and KPI

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register clinic and owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List users in clinic
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create user in clinic (owner/admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [auth]
      summary: Update user
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Delete user
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients (doctor sees only own patients)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientsListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient with interactions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient with interactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "200":
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete patient (owner/admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /patients/{id}/status:
    patch:
      operationId: updatePatientStatus
      tags: [patients]
      summary: Update patient status (kanban move)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"

  /patients/{id}/interactions:
    post:
      operationId: addPatientInteraction
      tags: [patients]
      summary: Add interaction to patient history
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInteractionRequest"
      responses:
        "201":
          description: Interaction added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionResponse"

  /patients/{patientId}/messages:
    get:
      operationId: listMessages
      summary: List messages for a patient
      security:
        - cookieAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
    post:
      operationId: sendMessage
      summary: Send WhatsApp message to patient
      security:
        - cookieAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications:
    get:
      operationId: listNotifications
      summary: List notifications for current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationsCount
      summary: Get unread notification count
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"

  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      security:
        - cookieAuth: []
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      summary: Mark a notification as read
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"

  # ─── Dental Chart ───────────────────────────────────────────────────────────

  /patients/{id}/teeth:
    get:
      operationId: listTeeth
      tags: [dental]
      summary: Get all tooth records for a patient
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tooth records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeethResponse"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patients/{id}/teeth/{toothFdi}:
    put:
      operationId: updateTooth
      tags: [dental]
      summary: Update condition/notes for a specific tooth
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: toothFdi
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateToothRequest"
      responses:
        "200":
          description: Tooth updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToothResponse"

  /patients/{id}/teeth/{toothFdi}/treatments:
    get:
      operationId: listToothTreatments
      tags: [dental]
      summary: Get treatment history for a specific tooth
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: toothFdi
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Treatment records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToothTreatmentsResponse"
    post:
      operationId: addToothTreatment
      tags: [dental]
      summary: Record a treatment on a specific tooth
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: toothFdi
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToothTreatmentRequest"
      responses:
        "201":
          description: Treatment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToothTreatmentResponse"

  # ─── Inventory ───────────────────────────────────────────────────────────────

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory items with stock levels
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create a new inventory item (warehouse/admin/owner)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemResponse"

  /inventory/{id}:
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemResponse"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete (deactivate) an inventory item
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /inventory/{id}/stock:
    patch:
      operationId: updateInventoryStock
      tags: [inventory]
      summary: Update stock quantity for an item
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStockRequest"
      responses:
        "200":
          description: Stock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemResponse"

  /inventory/consumption:
    get:
      operationId: getInventoryConsumption
      tags: [inventory]
      summary: Material consumption aggregated by procedure completions
      security:
        - cookieAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Consumption report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryConsumptionResponse"

  /webhook/whatsapp:
    get:
      operationId: verifyWhatsappWebhook
      summary: Verify WhatsApp webhook (Meta challenge)
      parameters:
        - name: hub.mode
          in: query
          schema:
            type: string
        - name: hub.verify_token
          in: query
          schema:
            type: string
        - name: hub.challenge
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Challenge response
          content:
            text/plain:
              schema:
                type: string

  /webhook/whatsapp/{clinicId}:
    post:
      operationId: inboundWhatsappWebhook
      summary: Receive inbound WhatsApp messages from Meta
      description: |
        Called by Meta's servers when a patient sends a WhatsApp message.
        Requires valid X-Hub-Signature-256 HMAC when WHATSAPP_APP_SECRET is set.
        Resolves sender phone number to a known patient before persisting.
        Returns 200 immediately to prevent Meta retries.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Hub-Signature-256
          in: header
          required: false
          schema:
            type: string
          description: "HMAC-SHA256 signature: sha256=<hex>. Required in production."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsAppWebhookPayload"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
        "403":
          description: Invalid webhook signature

  /procedures:
    get:
      operationId: listProcedures
      tags: [procedures]
      summary: List procedures
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of procedures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureListResponse"
    post:
      operationId: createProcedure
      tags: [procedures]
      summary: Create a procedure
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patientId:
                  type: string
                doctorId:
                  type: string
                templateId:
                  type: string
                name:
                  type: string
                price:
                  type: number
                notes:
                  type: string
                scheduledAt:
                  type: string
                  format: date-time
                materials:
                  type: array
                  items:
                    type: object
                    properties:
                      itemId:
                        type: string
                      quantity:
                        type: number
                    required:
                      - itemId
                      - quantity
              required:
                - patientId
                - name
      responses:
        "201":
          description: Procedure created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureResponse"

  /procedures/{id}:
    put:
      operationId: updateProcedure
      tags: [procedures]
      summary: Update procedure
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: number
                notes:
                  type: string
                doctorId:
                  type: string
                  nullable: true
                scheduledAt:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Procedure updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureResponse"
    delete:
      operationId: deleteProcedure
      tags: [procedures]
      summary: Delete procedure
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Procedure deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /procedures/{id}/status:
    patch:
      operationId: updateProcedureStatus
      tags: [procedures]
      summary: Update procedure status
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/ProcedureStatus"
              required:
                - status
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureResponse"

  /procedure-templates:
    get:
      operationId: listProcedureTemplatesAlias
      tags: [procedures]
      summary: List procedure templates (alias)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureTemplateListResponse"

  /procedures/templates:
    get:
      operationId: listProcedureTemplates
      tags: [procedures]
      summary: List procedure templates
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcedureTemplateListResponse"
    post:
      operationId: createProcedureTemplate
      tags: [procedures]
      summary: Create procedure template
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                defaultPrice:
                  type: number
                materials:
                  type: array
                  items:
                    $ref: "#/components/schemas/ProcedureMaterial"
              required:
                - name
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      template:
                        $ref: "#/components/schemas/ProcedureTemplate"

  /procedures/templates/{id}:
    delete:
      operationId: deleteProcedureTemplate
      tags: [procedures]
      summary: Delete procedure template
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /analytics:
    get:
      operationId: getAnalytics
      tags: [analytics]
      summary: Get role-based analytics
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

  /logs:
    get:
      operationId: getActionLogs
      tags: [logs]
      summary: Get action logs (owner only)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: actionType
          schema:
            type: string
        - in: query
          name: entityType
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
        - in: query
          name: dateTo
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Paginated action logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionLogsResponse"

  /followups:
    get:
      operationId: getFollowups
      tags: [followups]
      summary: Get post-op followups for a clinic
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: procedureId
          schema:
            type: string
        - in: query
          name: patientId
          schema:
            type: string
      responses:
        "200":
          description: List of followups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowupsResponse"
    post:
      operationId: createFollowups
      tags: [followups]
      summary: Schedule post-op followup messages
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowupsRequest"
      responses:
        "201":
          description: Followups created
          content:
