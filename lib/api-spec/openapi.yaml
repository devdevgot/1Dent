openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dental CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: patients
    description: Patient management operations
  - name: dental
    description: Dental chart and tooth records
  - name: inventory
    description: Inventory and stock management
  - name: procedures
    description: Procedure management
  - name: analytics
    description: Analytics and KPI
  - name: channels
    description: Channel tracking and UTM analytics
  - name: billing
    description: Subscription and plan upgrade requests
  - name: tablet
    description: SlashTablet cabinet sessions and QR linking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register clinic and owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    put:
      operationId: changePassword
      tags: [auth]
      summary: Change current user password
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Wrong current password or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent if account exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

                $ref: "#/components/schemas/ErrorResponse"

  /tablet/public/sessions:
    post:
      operationId: createTabletSession
      tags: [tablet]
      summary: Create a new tablet QR session (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTabletSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletSessionCreateResponse"
        "404":
          description: Cabinet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tablet/public/sessions/{sessionId}:
    get:
      operationId: getTabletSessionStatus
      tags: [tablet]
      summary: Poll tablet session unlock status (public)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletSessionStatusResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tablet/public/cabinets/{cabinetId}:
    get:
      operationId: getTabletCabinetPublic
      tags: [tablet]
      summary: Get cabinet metadata (public)
      parameters:
        - name: cabinetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cabinet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletCabinetPublicResponse"
        "404":
          description: Cabinet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tablet/public/cabinets/{cabinetId}/verify-pin:
    post:
      operationId: verifyTabletCabinetPin
      tags: [tablet]
      summary: Verify cabinet PIN on tablet lock screen (public)
      parameters:
        - name: cabinetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTabletCabinetPinRequest"
      responses:
        "200":
          description: PIN valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Invalid PIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tablet/me:
    get:
      operationId: getTabletMe
      tags: [tablet]
      summary: Tablet PIN status for current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Tablet user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletMeResponse"

  /tablet/cabinets:
    get:
      operationId: listTabletCabinets
      tags: [tablet]
      summary: List tablet cabinets for clinic
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Cabinets list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletCabinetsListResponse"

  /tablet/pin:
    post:
      operationId: setTabletPin
      tags: [tablet]
      summary: Set or update user tablet PIN (optionally redeem link)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetTabletPinRequest"
      responses:
        "200":
          description: PIN saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletPinResponse"

  /tablet/link:
    post:
      operationId: redeemTabletLink
      tags: [tablet]
      summary: Redeem QR link token from phone
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemTabletLinkRequest"
      responses:
        "200":
          description: Tablet unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletLinkRedeemResponse"
        "401":
          description: PIN required or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "428":
          description: PIN setup required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabletPinSetupRequiredResponse"

  /plan-requests:
    post:
      operationId: createPlanRequest
      tags: [billing]
      summary: Submit plan upgrade or pricing request
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: Plan request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRequestResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List users in clinic
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create user in clinic (owner/admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [auth]
      summary: Update user
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Delete user
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/capacity:
    patch:
      operationId: patchUserCapacity
      tags: [auth]
      summary: Update doctor capacity (max patients per day)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserCapacityRequest"
      responses:
        "200":
          description: Capacity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients (doctor sees only own patients)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientsListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient with interactions
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient with interactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientRequest"
      responses:
        "200":
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete patient (owner/admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /patients/{id}/status:
    patch:
      operationId: updatePatientStatus
      tags: [patients]
      summary: Update patient status (kanban move)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatientStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"

  /patients/{id}/interactions:
    post:
      operationId: addPatientInteraction
      tags: [patients]
      summary: Add interaction to patient history
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInteractionRequest"
      responses:
        "201":
          description: Interaction added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionResponse"

  /patients/{patientId}/messages:
    get:
      operationId: listMessages
      summary: List messages for a patient
      security:
        - cookieAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
    post:
      operationId: sendMessage
      summary: Send WhatsApp message to patient
      security:
        - cookieAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications:
    get:
      operationId: listNotifications
      summary: List notifications for current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationsCount
      summary: Get unread notification count
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"

  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      security:
        - cookieAuth: []
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      summary: Mark a notification as read
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"

  # ─── Dental Chart ───────────────────────────────────────────────────────────

  /clinic/condition-prices:
    get:
      operationId: getConditionPrices
      tags: [dental]
      summary: Get clinic condition prices and ICD-10 codes
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Condition prices map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionPricesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateConditionPrices
      tags: [dental]
      summary: Update clinic condition prices (owner/admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConditionPricesRequest"
      responses:
        "200":
          description: Condition prices updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConditionPricesResponse"
        "403":
          description: Forbidden - requires owner or admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patients/{id}/teeth:
    get:
      operationId: listTeeth
      tags: [dental]
      summary: Get all tooth records for a patient
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tooth records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeethResponse"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /patients/{id}/teeth/{toothFdi}:
    put:
      operationId: updateTooth
      tags: [dental]
      summary: Update condition/notes for a specific tooth
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: toothFdi
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateToothRequest"
      responses:
        "200":
          description: Tooth updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToothResponse"

  /patients/{id}/treatment-plans:
    get:
      operationId: listTreatmentPlans
      tags: [treatment-plans]
      summary: List all treatment plans for a patient
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of treatment plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPlansResponse"

  /patients/{id}/treatment-plan:
    get:
      operationId: getActiveTreatmentPlan
      tags: [treatment-plans]
      summary: Get active (non-completed) treatment plan for a patient
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active treatment plan or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPlanResponse"
    post:
      operationId: createTreatmentPlan
      tags: [treatment-plans]
      summary: Create a treatment plan (auto-generates items from tooth records if items not provided)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreatmentPlanRequest"
      responses:
        "201":
          description: Created treatment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPlanResponse"

  /patients/{id}/treatment-plan/{planId}:
    patch:
      operationId: updateTreatmentPlan
      tags: [treatment-plans]
      summary: Update treatment plan notes or status
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTreatmentPlanRequest"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPlanBaseResponse"

  /patients/{id}/treatment-plan/{planId}/approve:
    post:
      operationId: approveTreatmentPlan
      tags: [treatment-plans]
      summary: Approve treatment plan (sets status to approved)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: planId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPlanBaseResponse"

  /patients/{id}/treatment-plan/{planId}/items:
    post:
      operationId: addTreatmentPlanItem
      tags: [treatment-plans]
      summary: Add an item to a treatment plan
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: planId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTreatmentPlanItemRequest"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPlanItemResponse"

  /patients/{id}/treatment-plan/{planId}/items/{itemId}:
    patch:
      operationId: updateTreatmentPlanItem
      tags: [treatment-plans]
      summary: Update a treatment plan item (title, price, status)
      security:
