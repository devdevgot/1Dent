components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  schemas:
    WhatsAppWebhookPayload:
      type: object
      description: Inbound webhook payload from Meta WhatsApp Business API
      properties:
        entry:
          type: array
          items:
            type: object
            properties:
              changes:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: object
                      properties:
                        messages:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              from:
                                type: string
                                description: Sender's WhatsApp phone number (digits only, e.g. "79001234567")
                              text:
                                type: object
                                properties:
                                  body:
                                    type: string
                        metadata:
                          type: object
                          properties:
                            phone_number_id:
                              type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
      required:
        - success
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
      required:
        - success

    UserRole:
      type: string
      enum: [owner, admin, doctor, accountant, warehouse]

    User:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - name
        - email
        - role
        - createdAt

    Clinic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    RegisterRequest:
      type: object
      properties:
        clinicName:
          type: string
          minLength: 2
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - clinicName
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          $ref: "#/components/schemas/UserRole"
      required:
        - name
        - email
        - password
        - role

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            clinic:
              $ref: "#/components/schemas/Clinic"
          required:
            - user
            - clinic
      required:
        - success
        - data

    MeResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            clinic:
              $ref: "#/components/schemas/Clinic"
          required:
            - user
            - clinic
      required:
        - success
        - data

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
          required:
            - user
      required:
        - success
        - data

    UsersListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            users:
              type: array
              items:
                $ref: "#/components/schemas/User"
          required:
            - users
      required:
        - success
        - data

    PatientStatus:
      type: string
      enum:
        - new_request
        - initial_consultation
        - diagnostics
        - treatment_assigned
        - treatment_in_progress
        - post_op_monitoring
        - completed

    PatientSource:
      type: string
      enum:
        - instagram
        - referral
        - walk_in
        - website
        - whatsapp
        - other

    InteractionType:
      type: string
      enum:
        - note
        - call
        - whatsapp
        - status_change
        - appointment

    Patient:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        doctorId:
          type: string
          nullable: true
        name:
          type: string
        phone:
          type: string
        age:
          type: integer
          nullable: true
        source:
          $ref: "#/components/schemas/PatientSource"
        status:
          $ref: "#/components/schemas/PatientStatus"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - name
        - phone
        - source
        - status
        - createdAt
        - updatedAt

    PatientInteraction:
      type: object
      properties:
        id:
          type: string
        patientId:
          type: string
        clinicId:
          type: string
        userId:
          type: string
          nullable: true
        type:
          $ref: "#/components/schemas/InteractionType"
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - clinicId
        - type
        - content
        - createdAt

    CreatePatientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 5
        age:
          type: integer
        source:
          $ref: "#/components/schemas/PatientSource"
        doctorId:
          type: string
        notes:
          type: string
      required:
        - name
        - phone

    UpdatePatientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 5
        age:
          type: integer
        source:
          $ref: "#/components/schemas/PatientSource"
        doctorId:
          type: string
        notes:
          type: string

    UpdatePatientStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/PatientStatus"
      required:
        - status

    AddInteractionRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/InteractionType"
        content:
          type: string
          minLength: 1
      required:
        - type
        - content

    PatientResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            patient:
              $ref: "#/components/schemas/Patient"
          required:
            - patient
      required:
        - success
        - data

    PatientDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            patient:
              $ref: "#/components/schemas/Patient"
            interactions:
              type: array
              items:
                $ref: "#/components/schemas/PatientInteraction"
          required:
            - patient
            - interactions
      required:
        - success
        - data

    PatientsListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            patients:
              type: array
              items:
                $ref: "#/components/schemas/Patient"
          required:
            - patients
      required:
        - success
        - data

    InteractionResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            interaction:
              $ref: "#/components/schemas/PatientInteraction"
          required:
            - interaction
      required:
        - success
        - data

    # ─── Messaging ────────────────────────────────────────────────────────────

    MessageDirection:
      type: string
      enum: [inbound, outbound]

    Message:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        patientId:
          type: string
        direction:
          $ref: "#/components/schemas/MessageDirection"
        senderId:
          type: string
          nullable: true
        content:
          type: string
        whatsappMessageId:
          type: string
          nullable: true
        isRedAlert:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - patientId
        - direction
        - senderId
        - content
        - whatsappMessageId
        - isRedAlert
        - createdAt

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4096
      required:
        - content

    MessagesResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/Message"
          required:
            - messages
      required:
        - success
        - data

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            message:
              $ref: "#/components/schemas/Message"
          required:
            - message
      required:
        - success
        - data

    # ─── Notifications ────────────────────────────────────────────────────────

    NotificationType:
      type: string
      enum: [red_alert, new_message, appointment, system]

    Notification:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        userId:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        message:
          type: string
        read:
          type: boolean
        patientId:
          type: string
          nullable: true
        messageId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - userId
        - type
        - message
        - read
        - patientId
        - messageId
        - createdAt

    NotificationsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            notifications:
              type: array
              items:
                $ref: "#/components/schemas/Notification"
          required:
            - notifications
      required:
        - success
        - data

    NotificationResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            notification:
              $ref: "#/components/schemas/Notification"
          required:
            - notification
      required:
        - success
        - data

    # ─── Dental Chart ────────────────────────────────────────────────────────

    ToothCondition:
      type: string
      enum:
        - healthy
        - cavity
        - treated
        - crown
        - root_canal
        - implant
        - missing
        - extraction_needed

    ToothRecord:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        patientId:
          type: string
        toothFdi:
          type: integer
        condition:
          $ref: "#/components/schemas/ToothCondition"
        notes:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          nullable: true
      required:
        - id
        - clinicId
        - patientId
        - toothFdi
        - condition
        - updatedAt

    UpdateToothRequest:
      type: object
      properties:
        condition:
          $ref: "#/components/schemas/ToothCondition"
        notes:
          type: string
      required:
        - condition

    ToothResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            tooth:
              $ref: "#/components/schemas/ToothRecord"
          required:
            - tooth
      required:
        - success
        - data

    TeethResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            teeth:
              type: array
              items:
                $ref: "#/components/schemas/ToothRecord"
          required:
            - teeth
      required:
        - success
        - data

    ToothTreatment:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        patientId:
          type: string
        toothFdi:
          type: integer
        itemId:
          type: string
          nullable: true
        description:
          type: string
        quantityUsed:
          type: number
          nullable: true
        performedBy:
          type: string
          nullable: true
        performedAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - patientId
        - toothFdi
        - description
        - performedAt

    AddToothTreatmentRequest:
      type: object
      properties:
        description:
          type: string
          minLength: 1
        itemId:
          type: string
        quantityUsed:
          type: number
      required:
        - description

    ToothTreatmentResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            treatment:
              $ref: "#/components/schemas/ToothTreatment"
          required:
            - treatment
      required:
        - success
        - data

    ToothTreatmentsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            treatments:
              type: array
              items:
                $ref: "#/components/schemas/ToothTreatment"
          required:
            - treatments
      required:
        - success
        - data

    # ─── Inventory ────────────────────────────────────────────────────────────

    InventoryCategory:
      type: string
      enum:
        - materials
        - instruments
        - medications
        - consumables
        - prosthetics
        - implants
        - other

    InventoryItem:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        name:
          type: string
        category:
          $ref: "#/components/schemas/InventoryCategory"
        unit:
          type: string
        unitPrice:
          type: number
        isActive:
          type: boolean
        quantity:
          type: number
        minQuantity:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clinicId
        - name
        - category
        - unit
        - unitPrice
        - isActive
        - quantity
        - minQuantity
        - createdAt

    CreateInventoryItemRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          $ref: "#/components/schemas/InventoryCategory"
        unit:
          type: string
        unitPrice:
          type: number
        quantity:
          type: number
        minQuantity:
          type: number
      required:
        - name

    UpdateInventoryItemRequest:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: "#/components/schemas/InventoryCategory"
        unit:
          type: string
        unitPrice:
          type: number
        minQuantity:
          type: number

    UpdateStockRequest:
      type: object
      properties:
        quantity:
          type: number
      required:
        - quantity

    InventoryItemResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            item:
              $ref: "#/components/schemas/InventoryItem"
          required:
            - item
      required:
        - success
        - data

    InventoryListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/InventoryItem"
          required:
            - items
      required:
        - success
        - data

    InventoryConsumptionItem:
      type: object
      properties:
        itemId:
          type: string
        itemName:
          type: string
        unit:
          type: string
        unitPrice:
          type: number
        totalQuantity:
          type: number
        procedureCount:
          type: number
        totalCost:
          type: number
      required:
        - itemId
        - itemName
        - totalQuantity
        - procedureCount
        - totalCost

    InventoryConsumptionResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            consumption:
              type: array
              items:
                $ref: "#/components/schemas/InventoryConsumptionItem"
          required:
            - consumption
      required:
        - success
        - data

    UnreadCountResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            count:
              type: integer
          required:
            - count
      required:
