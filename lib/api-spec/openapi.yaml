              schema:
                type: string

  /webhook/whatsapp/{clinicId}:
    post:
      operationId: inboundWhatsappWebhook
      summary: Receive inbound WhatsApp messages from Meta
      description: |
        Called by Meta's servers when a patient sends a WhatsApp message.
        Requires valid X-Hub-Signature-256 HMAC when WHATSAPP_APP_SECRET is set.
        Resolves sender phone number to a known patient before persisting.
        Returns 200 immediately to prevent Meta retries.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Hub-Signature-256
          in: header
          required: false
          schema:
            type: string
          description: "HMAC-SHA256 signature: sha256=<hex>. Required in production."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsAppWebhookPayload"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
        "403":
          description: Invalid webhook signature

