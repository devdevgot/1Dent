kind = "web"
previewPath = "/"
title = "Dental CRM"
version = "1.0.0"
id = "artifacts/dental-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23816

[services.development]
run = "pnpm --filter @workspace/dental-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dental-crm", "run", "build" ]
publicDir = "artifacts/dental-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23816"
BASE_PATH = "/"
