<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <!-- Soft pastel tile — like reference category cards -->
    <linearGradient id="pm-tile" x1="12" y1="8" x2="68" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F7FF"/>
      <stop offset="0.5" stop-color="#E3EFFE"/>
      <stop offset="1" stop-color="#D4E6FD"/>
    </linearGradient>
    <linearGradient id="pm-tile-shine" x1="40" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- 3D figure materials -->
    <linearGradient id="pm-blue" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#5AA2FF"/>
      <stop offset="0.55" stop-color="#2B82FF"/>
      <stop offset="1" stop-color="#1A65E8"/>
    </linearGradient>
    <linearGradient id="pm-blue-light" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#B8D9FF"/>
      <stop offset="1" stop-color="#7EB8FF"/>
    </linearGradient>
    <radialGradient id="pm-white" cx="0.35" cy="0.28" r="0.85" gradientUnits="objectBoundingBox">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F4F8FF"/>
      <stop offset="1" stop-color="#D9E8FF"/>
    </radialGradient>
    <radialGradient id="pm-shadow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop stop-color="#1A65E8" stop-opacity="0.22"/>
      <stop offset="0.65" stop-color="#1A65E8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1A65E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="pm-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1A65E8" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Tile container -->
  <rect x="4" y="4" width="72" height="72" rx="22" fill="url(#pm-tile)"/>
  <rect x="4" y="4" width="72" height="36" rx="22" fill="url(#pm-tile-shine)"/>

  <!-- 3D group: slight tilt like reference objects -->
  <g transform="translate(40 42) rotate(-12) scale(1.02 0.96) translate(-40 -42)">
    <!-- Ground shadow inside tile -->
    <ellipse cx="40" cy="58" rx="22" ry="5" fill="url(#pm-shadow)"/>

    <g filter="url(#pm-soft)">
      <!-- back person — light blue, behind -->
      <g transform="translate(8 -1)">
        <ellipse cx="48" cy="36" rx="7.5" ry="7" fill="url(#pm-blue-light)"/>
        <ellipse cx="46" cy="34" rx="2.2" ry="2.6" fill="#FFFFFF" opacity="0.55"/>
        <path d="M36 54c0-6.8 5.2-12.3 12-12.3s12 5.5 12 12.3v1.2a1.8 1.8 0 0 1-1.8 1.8H37.8a1.8 1.8 0 0 1-1.8-1.8V54z"
              fill="url(#pm-blue-light)"/>
      </g>

      <!-- front person — white/blue, larger -->
      <ellipse cx="32" cy="35" rx="8.8" ry="8.2" fill="url(#pm-white)"/>
      <ellipse cx="29.5" cy="32" rx="2.8" ry="3.2" fill="#FFFFFF" opacity="0.85"/>
      <path d="M18 56c0-8.6 6.6-15.6 14.5-15.6S47 47.4 47 56v1.4a2.2 2.2 0 0 1-2.2 2.2H20.2A2.2 2.2 0 0 1 18 57.4V56z"
            fill="url(#pm-white)"/>
      <!-- blue accent on front torso edge -->
      <path d="M18 56c0-8.6 6.6-15.6 14.5-15.6c2.2 0 4.2 0.5 6 1.4-4.8 1.2-8.5 4.8-10.2 9.5-0.5 1.4-0.8 2.9-0.8 4.7v1.4a2.2 2.2 0 0 1-2.2 2.2H20.2A2.2 2.2 0 0 1 18 57.4V56z"
            fill="url(#pm-blue)" opacity="0.15"/>
    </g>
  </g>
</svg>
