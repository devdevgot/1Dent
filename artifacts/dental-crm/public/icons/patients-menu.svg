<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <defs>
    <!-- Squircle body: diagonal blue with depth -->
    <linearGradient id="pm-body" x1="14" y1="8" x2="58" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5AA2FF"/>
      <stop offset="0.5" stop-color="#2A7DFF"/>
      <stop offset="1" stop-color="#1454D6"/>
    </linearGradient>
    <!-- Top glossy reflection -->
    <linearGradient id="pm-gloss" x1="36" y1="6" x2="36" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner top edge light -->
    <linearGradient id="pm-edge" x1="36" y1="6" x2="36" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.12" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#0A3AA0" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A3AA0" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Front person: white with soft blue shade -->
    <radialGradient id="pm-front" cx="0.38" cy="0.3" r="0.85" gradientUnits="objectBoundingBox">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.6" stop-color="#F2F7FF"/>
      <stop offset="1" stop-color="#D6E6FF"/>
    </radialGradient>
    <!-- Back person: light blue -->
    <radialGradient id="pm-back" cx="0.4" cy="0.3" r="0.9" gradientUnits="objectBoundingBox">
      <stop stop-color="#CFE4FF"/>
      <stop offset="1" stop-color="#8FBEFF"/>
    </radialGradient>
    <!-- Drop shadow under the whole tile -->
    <filter id="pm-drop" x="-30%" y="-20%" width="160%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.2" flood-color="#123A8A" flood-opacity="0.35"/>
    </filter>
    <!-- Soft shadow for figures -->
    <filter id="pm-fig" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.6" flood-color="#0B3287" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Slight 3D tilt via rotation -->
  <g transform="rotate(-8 36 36)" filter="url(#pm-drop)">
    <!-- base body -->
    <rect x="10" y="8" width="52" height="52" rx="16"
          fill="url(#pm-body)" stroke="#1E63E0" stroke-width="0.5"/>
    <!-- inner edge highlight/shadow -->
    <rect x="10.75" y="8.75" width="50.5" height="50.5" rx="15.3"
          fill="none" stroke="url(#pm-edge)" stroke-width="1.5"/>
    <!-- top gloss -->
    <path d="M10 24C10 15.16 17.16 8 26 8h20c8.84 0 16 7.16 16 16v3c-10 6-18 8.5-26 8.5S18 33 10 27v-3z"
          fill="url(#pm-gloss)"/>

    <!-- figures with depth -->
    <g filter="url(#pm-fig)">
      <!-- back person -->
      <circle cx="45" cy="27" r="7.2" fill="url(#pm-back)"/>
      <path d="M32.5 50c0-7.4 5.6-13.4 12.5-13.4S57.5 42.6 57.5 50v1.6a2 2 0 0 1-2 2H34.5a2 2 0 0 1-2-2V50z"
            fill="url(#pm-back)"/>
      <!-- front person -->
      <circle cx="28.5" cy="26" r="8.4" fill="url(#pm-front)"/>
      <path d="M14 51c0-8.5 6.5-15.4 14.5-15.4S43 42.5 43 51v1.8a2.4 2.4 0 0 1-2.4 2.4H16.4A2.4 2.4 0 0 1 14 52.8V51z"
            fill="url(#pm-front)"/>
      <!-- tiny specular highlight on front head -->
      <ellipse cx="25.5" cy="22.5" rx="2.4" ry="3" fill="#FFFFFF" opacity="0.7"/>
    </g>
  </g>
</svg>
