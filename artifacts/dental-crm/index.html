<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="1Dent" />
    <meta name="application-name" content="1Dent" />
    <meta name="theme-color" content="#faf8f4" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var dark =
            theme === "dark" ||
            (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var resolved = dark ? "dark" : "light";
          var root = document.documentElement;
          root.classList.add(resolved);
          root.style.colorScheme = resolved;
          var color = dark ? "#0f172a" : "#faf8f4";
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", color);
          var status = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (status) status.setAttribute("content", dark ? "black" : "default");

          var standalone =
            window.matchMedia("(display-mode: standalone)").matches ||
            window.matchMedia("(display-mode: fullscreen)").matches ||
            window.matchMedia("(display-mode: minimal-ui)").matches ||
            window.navigator.standalone === true;
          if (standalone) {
            root.classList.add("pwa-standalone");
            // Once per PWA session — avoids a second splash after SW/chunk reloads.
            var splashKey = "1dent:pwa-splash-shown";
            var alreadyShown = false;
            try {
              alreadyShown = sessionStorage.getItem(splashKey) === "1";
            } catch (e2) {}
            if (!alreadyShown) {
              try {
                sessionStorage.setItem(splashKey, "1");
              } catch (e3) {}
              root.classList.add("pwa-splash-active");
              var preload = document.createElement("link");
              preload.rel = "preload";
              preload.as = "image";
              // Light PWA icon (matches OS launch screen) — not the 400KB logo_clean.
              preload.href = "/icons/pwa/icon-192.png";
              document.head.appendChild(preload);
            }
          }
        } catch (e) {}
      })();
    </script>
    <style>
      /* In-app PWA splash — paints before React; only when .pwa-splash-active is set.
         Keep .pwa-splash-active during the fade so display:flex is not yanked mid-transition. */
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: none;
        align-items: center;
        justify-content: center;
        background: #faf8f4;
        opacity: 1;
        transition: opacity 0.28s ease;
      }
      html.dark #pwa-splash {
        background: #0f172a;
      }
      html.pwa-splash-active #pwa-splash {
        display: flex;
      }
      #pwa-splash.is-hiding {
        opacity: 0;
        pointer-events: none;
      }
      #pwa-splash img {
        width: 5.5rem;
        height: 5.5rem;
        display: block;
        border-radius: 1.25rem;
        user-select: none;
        -webkit-user-drag: none;
      }
    </style>
    <title>1Dent</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Fetch the dashboard empty-state illustration up-front so it never pops in late -->
    <link rel="prefetch" as="image" href="/images/revenue-empty-illustration.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="pwa-splash" aria-hidden="true" data-shown-at="">
      <img
        src="/icons/pwa/icon-192.png"
        alt=""
        width="88"
        height="88"
        decoding="sync"
        fetchpriority="high"
        onerror="if (!this.dataset.fallback) { this.dataset.fallback = '1'; this.src = '/apple-touch-icon.png'; }"
      />
    </div>
    <script>
      (function () {
        var splash = document.getElementById("pwa-splash");
        if (!splash) return;
        if (document.documentElement.classList.contains("pwa-splash-active")) {
          splash.setAttribute("data-shown-at", String(Date.now()));
          // Safety: never leave the splash stuck if the app fails to boot.
          window.setTimeout(function () {
            if (splash.getAttribute("data-dismissed") === "1") return;
            splash.setAttribute("data-dismissed", "1");
            splash.classList.add("is-hiding");
            window.setTimeout(function () {
              document.documentElement.classList.remove("pwa-splash-active");
              splash.remove();
            }, 280);
          }, 5000);
        } else {
          splash.remove();
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
