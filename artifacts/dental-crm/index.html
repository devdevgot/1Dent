<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="1Dent" />
    <meta name="application-name" content="1Dent" />
    <meta name="theme-color" content="#faf8f4" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var dark =
            theme === "dark" ||
            (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var resolved = dark ? "dark" : "light";
          var root = document.documentElement;
          root.classList.add(resolved);
          root.style.colorScheme = resolved;
          var color = dark ? "#0f172a" : "#faf8f4";
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", color);
          var status = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (status) status.setAttribute("content", dark ? "black" : "default");
        } catch (e) {}
      })();
    </script>
    <title>1Dent</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Fetch the dashboard empty-state illustration up-front so it never pops in late -->
    <link rel="prefetch" as="image" href="/images/revenue-empty-illustration.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
