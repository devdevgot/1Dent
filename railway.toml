# Railway config-as-code for 1Dent (API + CRM + TMA in one service)
# Docs: https://docs.railway.com/guides/config-as-code

[build]
builder = "RAILPACK"
buildCommand = "bash ./scripts/deploy-build.sh"

[deploy]
startCommand = "pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
