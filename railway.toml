# Railway config-as-code for 1Dent (API + CRM + TMA in one service)
# Docs: https://docs.railway.com/guides/config-as-code

[build]
builder = "RAILPACK"
buildCommand = "bash ./scripts/deploy-build.sh"

[deploy]
# Normalizes DATABASE_URL and prints Railway setup hints if Postgres is not linked.
startCommand = "bash ./scripts/railway-start.sh"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
