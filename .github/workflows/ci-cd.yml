# CI/CD: checks on PR/push to dev and master.
#
# Branch flow: feature/* → dev (staging) → master (production)
# See docs/BRANCHING.md
#
# Railway production deploy mode: Auto-deploy (вариант A)
#   Railway Settings → Source → repo `devdevgot/1Dent`, branch `master`, Autodeploy ON.
#   This workflow only verifies the build. Railway itself deploys on push to master.
#   Секрет RAILWAY_DEPLOY_HOOK не нужен (вариант B — опциональный fallback).
#
# Flow:
#   push master → GitHub Actions (checks) + Railway auto-deploy (параллельно)
#   push dev    → только Checks (без деплоя в production)

name: CI/CD

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

# Не отменять прогоны на master
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install and build (same as Railway)
        run: bash ./scripts/deploy-build.sh

  # Optional fallback: only fires if RAILWAY_DEPLOY_HOOK is set.
  # Primary path is Railway GitHub Auto-deploy on master.
  deploy:
    name: Deploy to Railway (hook fallback)
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      url: https://1dent.kz
    steps:
      - name: Trigger Railway deploy hook (optional)
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "::notice::Auto-deploy mode: Railway деплоит сам с ветки master. Hook не нужен."
            echo "Проверьте: Railway → 1dent → Settings → Source → Autodeploy = Enabled, branch = master"
            echo "Инструкция: docs/RAILWAY_DEPLOY.md"
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$RAILWAY_DEPLOY_HOOK"
          echo "Railway deploy triggered via hook."
